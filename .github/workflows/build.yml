name: Build and Release EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
    paths:
      - "server.py"
      - "VERSION"
      - "scripts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if (Test-Path VERSION) { (Get-Content VERSION -Raw).Trim() } else { "${{ github.run_number }}" }
          if ("${{ github.ref_type }}" -eq "tag") { $version = "${{ github.ref_name }}".TrimStart("v") }
          "version=$version" >> $env:GITHUB_OUTPUT
          "exe=WindowsWeb-Super-Console-v$version.exe" >> $env:GITHUB_OUTPUT

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name "WindowsWeb-Super-Console-v${{ steps.version.outputs.version }}" server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.exe }}
          path: dist/${{ steps.version.outputs.exe }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: WindowsWeb Super Console ${{ github.ref_name }}
          files: dist/${{ steps.version.outputs.exe }}
          generate_release_notes: true
